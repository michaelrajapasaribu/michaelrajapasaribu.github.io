    <style>
        * {
            margin: 0;
            padding: 0;

        body {
            font-family: 'Karla', sans-serif;
            background-color: #e8e8e8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }


        .card {
            background-color: #ffffff;
            width: 100%;
            max-width: 480px;
            min-height: 100vh;
            border-radius: 20px;
            padding: 30px 20px 60px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            position: relative;
        }


        .header {
            text-align: center;
            margin-top: 30px;
            margin-bottom: 30px;
        }

        .foto-profil {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            object-fit: contain;
            border: 2px solid #e0e0e0;
            margin-bottom: 12px;
        }

        .nama-profil {
            font-size: 22px;
            font-weight: 700;
            color: #000000;
        }


        .daftar-link {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }

        .tombol-link {
            display: flex;
            align-items: center;
            background-color: #ffffff;
            border: 2px solid #000000;
            border-radius: 999px;
            box-shadow: 3px 4px 0px #000000;
            padding: 10px 16px;
            text-decoration: none;
            color: #000000;
            font-weight: 500;
            font-size: 15px;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            position: relative;
        }

        .tombol-link:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 5px 0px #000000;
        }

        .tombol-link:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 2px 0px #000000;
        }

        .ikon-tombol {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            object-fit: cover;
            margin-right: 12px;
            flex-shrink: 0;
        }

        .label-tombol {
            flex: 1;
            text-align: center;
        }


        .sosial-media {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-bottom: 30px;
        }

        .ikon-sosial {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #000000;
            transition: transform 0.2s ease;
        }

        .ikon-sosial:hover {
            transform: scale(1.15);
        }

        .ikon-sosial svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }


        .footer {
            text-align: center;
            font-size: 11px;
            color: #888888;
        }

        .footer a {
            color: #888888;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .footer span {
            margin: 0 4px;
        }
    </style>
